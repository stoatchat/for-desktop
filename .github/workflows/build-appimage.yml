          #name: Stoat-AppImage-${{ matrix.arch }}
         # path: ${{ matrix.arch == 'x64' && 'Stoat-linux-x86_64.AppImage' || 'Stoat-linux-arm64.AppImage' }}
         # if-no-files-found: error
